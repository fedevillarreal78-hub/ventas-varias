<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venta de Apartamento</title>
<meta name="description" content="Artículos en venta por salida de apartamento">
<style>
  :root{
    --azul:#1a3a5c; --azul-claro:#2e6da4; --verde:#25d366; --verde-oscuro:#1da851;
    --gris-fondo:#f4f6f8; --gris-texto:#5a6a7a; --rojo:#c0392b; --ambar:#e67e22;
    --blanco:#fff; --sombra:0 2px 10px rgba(20,40,60,.10); --radio:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--gris-fondo); color:#22303e; line-height:1.5;}

  /* ---------- Encabezado ---------- */
  header{background:linear-gradient(135deg,var(--azul) 0%,var(--azul-claro) 100%);
    color:var(--blanco); padding:34px 18px 26px; text-align:center;}
  header h1{font-size:1.7rem; font-weight:700; letter-spacing:.3px;}
  header p{margin-top:6px; opacity:.92; font-size:1rem; max-width:640px; margin-left:auto; margin-right:auto;}
  .contacto-general{display:inline-flex; align-items:center; gap:8px; margin-top:16px;
    background:var(--verde); color:var(--blanco); text-decoration:none; font-weight:600;
    padding:10px 20px; border-radius:30px; box-shadow:var(--sombra); transition:background .2s;}
  .contacto-general:hover{background:var(--verde-oscuro);}

  /* ---------- Barra de filtros ---------- */
  .controles{max-width:1180px; margin:18px auto 6px; padding:0 16px;
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;}
  .buscador{flex:1 1 220px; min-width:200px; position:relative;}
  .buscador input{width:100%; padding:11px 14px 11px 38px; border:1px solid #d5dde5;
    border-radius:30px; font-size:.95rem; background:var(--blanco); outline:none;}
  .buscador input:focus{border-color:var(--azul-claro);}
  .buscador svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.45;}
  .filtros{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{border:1px solid #d5dde5; background:var(--blanco); color:#3b4a59; padding:8px 15px;
    border-radius:30px; font-size:.88rem; cursor:pointer; transition:all .15s; user-select:none;}
  .chip:hover{border-color:var(--azul-claro);}
  .chip.activo{background:var(--azul); color:var(--blanco); border-color:var(--azul);}
  .conteo{max-width:1180px; margin:4px auto 0; padding:0 16px; color:var(--gris-texto); font-size:.9rem;}

  /* ---------- Cuadrícula ---------- */
  .grilla{max-width:1180px; margin:14px auto 40px; padding:0 16px;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(265px,1fr)); gap:18px;}
  .tarjeta{background:var(--blanco); border-radius:var(--radio); overflow:hidden;
    box-shadow:var(--sombra); display:flex; flex-direction:column; position:relative;
    transition:transform .15s;}
  .tarjeta:hover{transform:translateY(-3px);}
  .tarjeta.vendido .foto img{filter:grayscale(1) brightness(.85);}

  /* Carrusel */
  .foto{position:relative; aspect-ratio:4/3; background:#e8edf2; overflow:hidden; cursor:pointer;}
  .foto img{width:100%; height:100%; object-fit:cover; display:block;}
  .flecha{position:absolute; top:50%; transform:translateY(-50%); width:32px; height:32px;
    border:none; border-radius:50%; background:rgba(255,255,255,.85); color:#22303e;
    font-size:18px; line-height:1; cursor:pointer; display:flex; align-items:center;
    justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.25); z-index:2;}
  .flecha.izq{left:8px;} .flecha.der{right:8px;}
  .puntos{position:absolute; bottom:8px; left:0; right:0; display:flex; justify-content:center; gap:5px; z-index:2;}
  .puntos span{width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.55);}
  .puntos span.activo{background:var(--blanco);}

  /* Etiquetas de estado */
  .etiqueta{position:absolute; top:10px; left:10px; z-index:3; padding:4px 12px;
    border-radius:20px; font-size:.75rem; font-weight:700; color:var(--blanco);
    text-transform:uppercase; letter-spacing:.5px;}
  .etiqueta.vendido{background:var(--rojo);}
  .etiqueta.reservado{background:var(--ambar);}

  /* Contenido de tarjeta */
  .info{padding:14px 16px 16px; display:flex; flex-direction:column; flex:1;}
  .categoria{font-size:.75rem; color:var(--azul-claro); font-weight:600;
    text-transform:uppercase; letter-spacing:.6px;}
  .nombre{font-size:1.05rem; font-weight:700; margin:3px 0 4px;}
  .descripcion{font-size:.88rem; color:var(--gris-texto); flex:1;}
  .medidas{font-size:.8rem; color:var(--gris-texto); margin-top:5px;}
  .precios{margin:10px 0 12px; display:flex; align-items:baseline; gap:8px;}
  .precio{font-size:1.3rem; font-weight:800; color:var(--azul);}
  .precio-original{font-size:.9rem; color:#98a4b0; text-decoration:line-through;}
  .btn-wa{display:flex; align-items:center; justify-content:center; gap:8px;
    background:var(--verde); color:var(--blanco); text-decoration:none; font-weight:600;
    padding:11px; border-radius:10px; font-size:.95rem; transition:background .2s;}
  .btn-wa:hover{background:var(--verde-oscuro);}
  .btn-vendido{display:block; text-align:center; background:#e3e8ed; color:#8a97a4;
    font-weight:600; padding:11px; border-radius:10px; font-size:.95rem; cursor:default;}

  .vacio{grid-column:1/-1; text-align:center; color:var(--gris-texto); padding:60px 20px; font-size:1rem;}

  /* ---------- Visor de imagen ampliada ---------- */
  .visor{position:fixed; inset:0; background:rgba(10,20,30,.92); display:none;
    align-items:center; justify-content:center; z-index:100; flex-direction:column;}
  .visor.abierto{display:flex;}
  .visor img{max-width:92vw; max-height:80vh; border-radius:8px;}
  .visor .cerrar{position:absolute; top:16px; right:20px; background:none; border:none;
    color:var(--blanco); font-size:34px; cursor:pointer; line-height:1;}
  .visor .flecha{background:rgba(255,255,255,.2); color:var(--blanco); width:44px; height:44px; font-size:24px;}
  .visor .pie{color:#cdd8e2; margin-top:12px; font-size:.95rem;}

  footer{text-align:center; padding:26px 16px 36px; color:var(--gris-texto); font-size:.85rem;}

  @media (max-width:560px){
    header h1{font-size:1.4rem;}
    .grilla{grid-template-columns:1fr; gap:15px;}
    .controles{gap:8px;}
  }
  @media (min-width:561px) and (max-width:820px){
    .grilla{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<header>
  <h1 id="titulo"></h1>
  <p id="subtitulo"></p>
  <a id="contactoGeneral" class="contacto-general" target="_blank" rel="noopener">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.5 0 1.47 1.07 2.9 1.22 3.1.15.2 2.1 3.2 5.1 4.49.71.31 1.27.49 1.7.63.72.23 1.37.2 1.88.12.57-.09 1.76-.72 2.01-1.42.25-.7.25-1.29.17-1.42-.07-.12-.27-.2-.57-.35m-5.45 7.44h-.01a9.87 9.87 0 0 1-5.03-1.38l-.36-.21-3.74.98 1-3.65-.24-.37a9.86 9.86 0 0 1-1.51-5.26c0-5.45 4.44-9.88 9.9-9.88 2.64 0 5.12 1.03 6.99 2.9a9.82 9.82 0 0 1 2.89 6.99c0 5.45-4.44 9.88-9.89 9.88M20.52 3.45A11.8 11.8 0 0 0 12.05 0C5.5 0 .16 5.33.16 11.89c0 2.1.55 4.14 1.59 5.94L.06 24l6.3-1.65a11.88 11.88 0 0 0 5.68 1.45h.01c6.55 0 11.89-5.33 11.89-11.89 0-3.18-1.24-6.16-3.42-8.46"/></svg>
    Contactar por WhatsApp
  </a>
</header>

<div class="controles">
  <div class="buscador">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22303e" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
    <input id="busqueda" type="search" placeholder="Buscar artículo…">
  </div>
  <div class="filtros" id="filtroCategorias"></div>
  <div class="filtros">
    <button class="chip activo" data-estado="todos">Todo</button>
    <button class="chip" data-estado="disponible">Solo disponibles</button>
  </div>
</div>
<p class="conteo" id="conteo"></p>

<main class="grilla" id="grilla"></main>

<div class="visor" id="visor">
  <button class="cerrar" onclick="cerrarVisor()">&times;</button>
  <button class="flecha izq" onclick="moverVisor(-1)">&#10094;</button>
  <img id="visorImg" src="" alt="">
  <button class="flecha der" onclick="moverVisor(1)">&#10095;</button>
  <p class="pie" id="visorPie"></p>
</div>

<footer id="pie"></footer>

<script src="productos.js"></script>
<script>
/* ============================================================
   No es necesario editar nada debajo de esta línea.
   Todo el contenido se gestiona desde el archivo productos.js
   ============================================================ */
const IMAGEN_FALTANTE = "data:image/svg+xml," + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect width="400" height="300" fill="#dde5ec"/><text x="200" y="150" font-family="sans-serif" font-size="18" fill="#8a97a4" text-anchor="middle">Foto pendiente</text></svg>');

let filtroCategoria = "todas";
let filtroEstado = "todos";
let textoBusqueda = "";
const indiceFoto = {};        // índice de foto visible por producto
let visorProducto = null, visorIdx = 0;

const $ = s => document.querySelector(s);
const visibles = () => PRODUCTOS.filter(p => p.estado !== "oculto");

function precioFmt(n){ return CONFIG.moneda + " " + Number(n).toLocaleString("es-GT"); }

function linkWhatsApp(p){
  const msj = `Hola, vi la página de venta y me interesa: *${p.nombre}* (${precioFmt(p.precio)}). ¿Sigue disponible?`;
  return `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msj)}`;
}

function iniciar(){
  document.title = CONFIG.titulo;
  $("#titulo").textContent = CONFIG.titulo;
  $("#subtitulo").textContent = CONFIG.subtitulo;
  $("#pie").textContent = CONFIG.notaPie || "";
  $("#contactoGeneral").href =
    `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent("Hola, vi la página de venta del apartamento y quisiera más información.")}`;

  // Chips de categoría generados automáticamente
  const cats = [...new Set(visibles().map(p => p.categoria))];
  const cont = $("#filtroCategorias");
  cont.innerHTML = `<button class="chip activo" data-cat="todas">Todas</button>` +
    cats.map(c => `<button class="chip" data-cat="${c}">${c}</button>`).join("");
  cont.querySelectorAll(".chip").forEach(ch => ch.onclick = () => {
    cont.querySelectorAll(".chip").forEach(x => x.classList.remove("activo"));
    ch.classList.add("activo");
    filtroCategoria = ch.dataset.cat;
    pintar();
  });

  document.querySelectorAll("[data-estado]").forEach(ch => ch.onclick = () => {
    document.querySelectorAll("[data-estado]").forEach(x => x.classList.remove("activo"));
    ch.classList.add("activo");
    filtroEstado = ch.dataset.estado;
    pintar();
  });

  $("#busqueda").oninput = e => { textoBusqueda = e.target.value.toLowerCase(); pintar(); };
  pintar();
}

function filtrados(){
  const orden = { disponible: 0, reservado: 1, vendido: 2 };
  return visibles()
    .filter(p => filtroCategoria === "todas" || p.categoria === filtroCategoria)
    .filter(p => filtroEstado === "todos" || p.estado === "disponible")
    .filter(p => (p.nombre + " " + (p.descripcion||"")).toLowerCase().includes(textoBusqueda))
    .sort((a,b) => (orden[a.estado] ?? 0) - (orden[b.estado] ?? 0));
}

function pintar(){
  const lista = filtrados();
  const disp = visibles().filter(p => p.estado === "disponible").length;
  $("#conteo").textContent = `${lista.length} artículo(s) en pantalla · ${disp} disponible(s) en total`;

  const g = $("#grilla");
  if(!lista.length){ g.innerHTML = `<p class="vacio">No hay artículos que coincidan con la búsqueda.</p>`; return; }

  g.innerHTML = lista.map(p => {
    const fotos = (p.imagenes && p.imagenes.length) ? p.imagenes : [IMAGEN_FALTANTE];
    const i = indiceFoto[p.id] || 0;
    const varias = fotos.length > 1;
    const etiqueta = p.estado === "vendido" ? `<span class="etiqueta vendido">Vendido</span>` :
                     p.estado === "reservado" ? `<span class="etiqueta reservado">Reservado</span>` : "";
    const boton = p.estado === "vendido"
      ? `<span class="btn-vendido">Vendido</span>`
      : `<a class="btn-wa" target="_blank" rel="noopener" href="${linkWhatsApp(p)}">
           <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.5 0 1.47 1.07 2.9 1.22 3.1.15.2 2.1 3.2 5.1 4.49.71.31 1.27.49 1.7.63.72.23 1.37.2 1.88.12.57-.09 1.76-.72 2.01-1.42.25-.7.25-1.29.17-1.42-.07-.12-.27-.2-.57-.35m-5.45 7.44h-.01a9.87 9.87 0 0 1-5.03-1.38l-.36-.21-3.74.98 1-3.65-.24-.37a9.86 9.86 0 0 1-1.51-5.26c0-5.45 4.44-9.88 9.9-9.88 2.64 0 5.12 1.03 6.99 2.9a9.82 9.82 0 0 1 2.89 6.99c0 5.45-4.44 9.88-9.89 9.88M20.52 3.45A11.8 11.8 0 0 0 12.05 0C5.5 0 .16 5.33.16 11.89c0 2.1.55 4.14 1.59 5.94L.06 24l6.3-1.65a11.88 11.88 0 0 0 5.68 1.45h.01c6.55 0 11.89-5.33 11.89-11.89 0-3.18-1.24-6.16-3.42-8.46"/></svg>
           Me interesa</a>`;
    return `
    <article class="tarjeta ${p.estado}">
      <div class="foto" onclick="abrirVisor('${p.id}')">
        ${etiqueta}
        <img src="${fotos[i]}" alt="${p.nombre}" loading="lazy"
             onerror="this.onerror=null;this.src='${IMAGEN_FALTANTE}'">
        ${varias ? `
          <button class="flecha izq" onclick="event.stopPropagation();moverFoto('${p.id}',-1)">&#10094;</button>
          <button class="flecha der" onclick="event.stopPropagation();moverFoto('${p.id}',1)">&#10095;</button>
          <div class="puntos">${fotos.map((_,k)=>`<span class="${k===i?'activo':''}"></span>`).join("")}</div>` : ""}
      </div>
      <div class="info">
        <span class="categoria">${p.categoria}</span>
        <h2 class="nombre">${p.nombre}</h2>
        <p class="descripcion">${p.descripcion || ""}</p>
        ${p.medidas ? `<p class="medidas">📐 ${p.medidas}</p>` : ""}
        <div class="precios">
          <span class="precio">${precioFmt(p.precio)}</span>
          ${p.precioOriginal ? `<span class="precio-original">${precioFmt(p.precioOriginal)}</span>` : ""}
        </div>
        ${boton}
      </div>
    </article>`;
  }).join("");
}

function moverFoto(id, d){
  const p = PRODUCTOS.find(x => String(x.id) === String(id));
  const n = (p.imagenes && p.imagenes.length) || 1;
  indiceFoto[id] = (((indiceFoto[id] || 0) + d) % n + n) % n;
  pintar();
}

/* Visor ampliado */
function abrirVisor(id){
  visorProducto = PRODUCTOS.find(x => String(x.id) === String(id));
  visorIdx = indiceFoto[id] || 0;
  actualizarVisor();
  $("#visor").classList.add("abierto");
  document.body.style.overflow = "hidden";
}
function actualizarVisor(){
  const fotos = (visorProducto.imagenes && visorProducto.imagenes.length) ? visorProducto.imagenes : [IMAGEN_FALTANTE];
  $("#visorImg").src = fotos[visorIdx % fotos.length];
  $("#visorPie").textContent = `${visorProducto.nombre} · foto ${ (visorIdx % fotos.length)+1 } de ${fotos.length}`;
}
function moverVisor(d){
  const n = (visorProducto.imagenes && visorProducto.imagenes.length) || 1;
  visorIdx = ((visorIdx + d) % n + n) % n;
  actualizarVisor();
}
function cerrarVisor(){
  $("#visor").classList.remove("abierto");
  document.body.style.overflow = "";
}
$("#visor").addEventListener("click", e => { if(e.target.id === "visor") cerrarVisor(); });
document.addEventListener("keydown", e => {
  if(!$("#visor").classList.contains("abierto")) return;
  if(e.key === "Escape") cerrarVisor();
  if(e.key === "ArrowLeft") moverVisor(-1);
  if(e.key === "ArrowRight") moverVisor(1);
});

iniciar();
</script>
</body>
</html>
